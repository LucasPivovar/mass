# =========================================================================
# CONFIGURAÇÃO DO NGINX PARA O DOMÍNIO: massflow.tech
# =========================================================================
#
# Salve esta configuração no servidor em: /etc/nginx/sites-available/massflow
# Ative com: ln -s /etc/nginx/sites-available/massflow /etc/nginx/sites-enabled/
#
# Escolha a Opção A (Site Principal) ou Opção B (Subpasta) dependendo da sua necessidade.

# =========================================================================
# OPÇÃO A: massflow.tech como SITE PRINCIPAL (Recomendado ⭐)
# O app abrirá diretamente em: https://massflow.tech
# =========================================================================

server {
    listen 80;
    server_name massflow.tech www.massflow.tech;
    
    # Redireciona todo tráfego HTTP para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name massflow.tech www.massflow.tech;

    # SSL Let's Encrypt (Ajuste os caminhos se necessário)
    ssl_certificate /etc/letsencrypt/live/massflow.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/massflow.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Habilita compressão Gzip para carregamento super rápido
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;

    # 1. FRONTEND: React SPA no root "/"
    location / {
        root /var/www/bot-disparo/client/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Otimização de Cache para arquivos estáticos compilados pelo Vite
        location ~* \.(?:css|js|woff2?|eot|ttf|otf|ico|png|jpe?g|gif|webp|svg)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }
    }

    # 2. UPLOADS DIRETOS PELO NGINX: Entrega imediata de mídias disparadas
    location /api/uploads/ {
        alias /var/www/bot-disparo/server/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        
        # Proteção: Impede execução de scripts na pasta de uploads
        location ~ \.(php|pl|py|jsp|sh|cgi)$ {
            deny all;
        }
    }

    # 3. BACKEND API: Proxy reverso para o Node.js (PM2 na porta 5000)
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        
        # Headers para WebSocket e IP real do cliente
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
        
        # IMPORTANTE: Permite planilhas e mídias pesadas de até 100MB (WhatsApp)
        client_max_body_size 100M; 
        
        # Timeouts estendidos para processamentos longos
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }
}


